<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sports Registration</title>
  <link rel="stylesheet" href="pp-d.css" />
  <link href='https://fonts.googleapis.com/css?family=Poppins' rel='stylesheet'>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      overflow-x: hidden;
    }

    /* === Header === */
    .header {
      padding-top: 100px;
      text-align: center;
      padding: 50px 20px;
      font-size: 34px;
      font-weight: bold;
      color: #044204;   
      text-shadow: 0 0 10px #466646;
    }

    /* === Cards with Flip === */
    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      gap: 60px;
      padding: 60px 30px;
    }

    .flip-card {
      background-color: rgb(255, 253, 253); 
      width: 280px;
      height: 360px;
      perspective: 1000px;
    }

    .flip-card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.8s;
      transform-style: preserve-3d;
    }

    .flip-card:hover .flip-card-inner {
      transform: rotateY(180deg);
    }

    .card-front, .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 30px 20px;
      text-align: center;
      box-shadow: 0 0 15px rgba(0, 255, 225, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .card-front img {
      height: 120px;
      margin-bottom: 20px;
      border-radius: 10px;
    }

    .card-front h3 {
      font-size: 22px;
      color: #000000;
      margin-bottom: 10px;
    }

    .card-front p {
      font-size: 14px;
      color: #1f1e1e;
      line-height: 1.4;
    }

    .card-back {
      transform: rotateY(180deg);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .card-back h3 {
      color: black;
      margin-bottom: 20px;
    }

    .card-back button {
      background-color:  #04641c;
      border: 2px solid #40b6a8;
      color:black;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .card-back button:hover {
      background: #023805;
      color: white;
      box-shadow: 0 0 10px #58bdb1;
    }
  </style>
</head>
<body>
  <div id="navbar"></div>

  <!-- Header -->
  <div class="header">Sports Registration</div>

  <!-- Content Cards -->
  <div class="container">

    <div class="flip-card">
      <div class="flip-card-inner">
        <div class="card-front">
          <img src="indoor2.jpg" alt="Indoor Games">
          <h3>Indoor Games</h3>
          <p>"Small steps, big goals."<br> Chess, Carroms, Table Tennis and more.</p>
        </div>
        <div class="card-back">
          <h3>Ready to play?</h3>
          <a href="indooradmin.html"><button>Register</button></a>
        </div>
      </div>
    </div>

    <div class="flip-card">
      <div class="flip-card-inner">
        <div class="card-front">
          <img src="cri.jpg" alt="Outdoor Games">
          <h3>Outdoor Games</h3>
          <p>"No sweat, no gain."<br> Cricket, Football, Athletics and more.</p>
        </div>
        <div class="card-back">
          <h3>Ready to compete?</h3>
          <a href="outdooradmin.html"><button>Register</button></a>
        </div>
      </div>
    </div>

  </div>

  <script>
    function toggleMenu() {
      const navList = document.querySelector(".links ul");
      navList.classList.toggle("active");
    }
  </script>
  <script src="pp-d.js"></script>
  <script src="profile-d.js"></script>
</body>
</html>
