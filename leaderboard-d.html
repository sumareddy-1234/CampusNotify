<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CampusNotify • Leaderboard</title>
<style>
:root{
  --bg:#e6fff9;          /* mint background */
  --card:#ffffff;        /* white cards */
  --muted:#a1e8d0;       /* muted mint */
  --accent:#3ecf99;      /* mint green accent */
  --gold:#f1c40f; --silver:#bdc3c7; --bronze:#cd7f32;
  --text:#064d40; --sub:#1a6b5c;
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:Inter,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
}

header{
  position:sticky; top:0;
  z-index:10;
  background:rgba(255,255,255,0.9);
  backdrop-filter:saturate(140%) blur(8px);
  border-bottom:1px solid #c0f0df;
}

.container{max-width:1200px;margin:0 auto;padding:18px}

h1{margin:0;font-size:24px;letter-spacing:.3px}
.tag{display:inline-flex;gap:8px;align-items:center;background:var(--muted);border-radius:999px;padding:6px 10px;color:var(--sub);font-size:12px}
.tag b{color:var(--accent)}

.controls{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px}
select,input[type="search"],button{
  background:var(--card);
  border:1px solid var(--accent);
  color:var(--text);
  border-radius:10px;
  padding:10px 12px;
  font-size:13px;
}
button{cursor:pointer}
button.primary{background:var(--accent);color:#fff;border:none}
button.ghost{background:transparent;border:1px solid var(--accent);color:var(--accent)}

.grid{display:grid;gap:18px}
.card{background:var(--card);border-radius:16px;box-shadow:0 8px 24px rgba(0,0,0,.1)}
.card.pad{padding:16px}

.section-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;color:var(--text)}
.muted{color:var(--sub)}

.table{
  width:100%;
  border-collapse:separate;
  border-spacing:0 8px;
}
.table th{
  font-weight:600;color:var(--sub);font-size:12px;
  text-transform:uppercase;letter-spacing:.08em;text-align:left;padding:8px 12px;
}
.table td{
  padding:10px 12px;
  background:var(--bg);
  border-radius:12px;
  color:var(--text);
}
.table tr td:first-child{font-weight:700;text-align:center;width:50px;}
.table tr td:nth-child(3){font-weight:600;text-align:center;}
.table tr td:nth-child(4){text-align:center;}
.table tr td:nth-child(5){text-align:center;}
.table tr td:nth-child(6){text-align:center;}

.avatar{
  width:36px;height:36px;border-radius:50%;
  display:grid;place-items:center;
  background:var(--muted);
  color:var(--accent);
  font-weight:700;
}

.progress{height:8px;background:#d1f2eb;border-radius:999px;overflow:hidden}
.progress>i{display:block;height:100%;background:var(--accent);}

.badges .chip{
  border-radius:999px;
  padding:4px 8px;
  font-size:11px;
}
.chip.gold{background:#fdf1c0;color:#f1c40f;}
.chip.silver{background:#e0e0e0;color:#7a7a7a;}
.chip.bronze{background:#f2d1b0;color:#cd7f32;}
.kudos{color:var(--accent);font-weight:600;}
</style>
</head>
<body>
<header>
  <div class="container">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
      <div>
        <h1>CampusNotify Leaderboard</h1>
        <div class="tag">Gamified points • <b>Top 50</b> • Badges</div>
      </div>
      <div class="controls">
        <select id="timeFilter">
          <option value="all">All‑time</option>
          <option value="month">This month</option>
          <option value="week">This week</option>
        </select>
        <select id="catFilter">
          <option value="all">All categories</option>
          <option value="hackathons">Hackathons</option>
          <option value="internships">Internships</option>
          <option value="events">Events</option>
          <option value="clubs">Clubs</option>
        </select>
        <input id="search" type="search" placeholder="Search name…" />
        <button id="rulesBtn" class="ghost">Points Rules</button>
      </div>
    </div>
  </div>
</header>

<main class="container grid" style="grid-template-columns:2fr 1fr;gap:20px;margin-top:18px;">
  <section class="grid">
    <div class="card pad">
      <div class="section-title"><h3 style="margin:0">Leaderboard</h3><span class="muted" id="count"></span></div>
      <div style="overflow:auto">
        <table class="table">
          <thead>
            <tr>
              <th>Rank</th><th>Participant</th><th>Points</th><th>Badges</th><th>Level</th><th>Cheer</th>
            </tr>
          </thead>
          <tbody id="list"></tbody>
        </table>
      </div>
    </div>
  </section>

  <aside class="grid">
    <div class="card pad">
      <div class="section-title"><h3 style="margin:0">Top 10 (Quick View)</h3><span class="muted">Sidebar</span></div>
      <div id="mini" class="mini-list"></div>
    </div>

    <div class="card pad">
      <div class="section-title"><h3 style="margin:0">Your Position</h3><span class="muted" id="youRankNote"></span></div>
      <div id="youCard"></div>
    </div>
  </aside>
</main>

<script>
const participants = [
  { id: 1, name: "Aarav Sharma", college: "Aditya Engineering College", points: 5000, monthPoints: 1800, weekPoints: 500, catPoints: { hackathons: 2000, internships: 1500, events: 1000, clubs: 500 }, streak: 10, lastGain: 250 },
  { id: 2, name: "Isha Reddy", college: "Aditya Engineering College", points: 4500, monthPoints: 1600, weekPoints: 450, catPoints: { hackathons: 1500, internships: 1200, events: 900, clubs: 900 }, streak: 7, lastGain: 220 },
  { id: 3, name: "Vikram Rao", college: "Aditya Engineering College", points: 4300, monthPoints: 1500, weekPoints: 420, catPoints: { hackathons: 1300, internships: 1000, events: 800, clubs: 1200 }, streak: 8, lastGain: 200 },
  { id: 4, name: "Neha Gupta", college: "Aditya Engineering College", points: 4000, monthPoints: 1400, weekPoints: 380, catPoints: { hackathons: 1100, internships: 900, events: 700, clubs: 1000 }, streak: 5, lastGain: 150 },
  { id: 5, name: "Kiran Patel", college: "Aditya Engineering College", points: 3900, monthPoints: 1300, weekPoints: 360, catPoints: { hackathons: 1000, internships: 900, events: 600, clubs: 1100 }, streak: 8, lastGain: 180 },
  { id: 6, name: "Ananya Roy", college: "Aditya Engineering College", points: 3700, monthPoints: 1200, weekPoints: 300, catPoints: { hackathons: 900, internships: 800, events: 700, clubs: 1000 }, streak: 6, lastGain: 200 },
  { id: 7, name: "Sanjay Verma", college: "Aditya Engineering College", points: 3500, monthPoints: 1100, weekPoints: 280, catPoints: { hackathons: 850, internships: 700, events: 650, clubs: 1000 }, streak: 4, lastGain: 190 },
  { id: 8, name: "Pooja Nair", college: "Aditya Engineering College", points: 3400, monthPoints: 1050, weekPoints: 270, catPoints: { hackathons: 800, internships: 700, events: 600, clubs: 1000 }, streak: 9, lastGain: 210 },
  { id: 9, name: "Rahul Mehta", college: "Aditya Engineering College", points: 3300, monthPoints: 1000, weekPoints: 250, catPoints: { hackathons: 750, internships: 650, events: 550, clubs: 1050 }, streak: 3, lastGain: 160 },
  { id: 10, name: "Sneha Kulkarni", college: "Aditya Engineering College", points: 3200, monthPoints: 950, weekPoints: 230, catPoints: { hackathons: 700, internships: 600, events: 500, clubs: 1100 }, streak: 7, lastGain: 180 },
  
  { id: 11, name: "Aditya Singh", college: "Aditya Engineering College", points: 3100, monthPoints: 900, weekPoints: 220, catPoints: { hackathons: 650, internships: 600, events: 500, clubs: 1050 }, streak: 6, lastGain: 150 },
  { id: 12, name: "Priya Menon", college: "Aditya Engineering College", points: 3000, monthPoints: 850, weekPoints: 200, catPoints: { hackathons: 600, internships: 550, events: 500, clubs: 1050 }, streak: 5, lastGain: 170 },
  { id: 13, name: "Rohan Das", college: "Aditya Engineering College", points: 2900, monthPoints: 800, weekPoints: 190, catPoints: { hackathons: 550, internships: 500, events: 500, clubs: 1050 }, streak: 4, lastGain: 160 },
  { id: 14, name: "Meera Iyer", college: "Aditya Engineering College", points: 2800, monthPoints: 750, weekPoints: 180, catPoints: { hackathons: 500, internships: 500, events: 500, clubs: 1000 }, streak: 5, lastGain: 150 },
  { id: 15, name: "Harsh Vardhan", college: "Aditya Engineering College", points: 2700, monthPoints: 700, weekPoints: 170, catPoints: { hackathons: 450, internships: 450, events: 500, clubs: 1000 }, streak: 3, lastGain: 140 },
  { id: 16, name: "Kavya S", college: "Aditya Engineering College", points: 2600, monthPoints: 680, weekPoints: 160, catPoints: { hackathons: 400, internships: 450, events: 500, clubs: 950 }, streak: 2, lastGain: 120 },
  { id: 17, name: "Arjun N", college: "Aditya Engineering College", points: 2500, monthPoints: 650, weekPoints: 150, catPoints: { hackathons: 400, internships: 400, events: 500, clubs: 900 }, streak: 4, lastGain: 130 },
  { id: 18, name: "Tanvi B", college: "Aditya Engineering College", points: 2400, monthPoints: 600, weekPoints: 140, catPoints: { hackathons: 350, internships: 400, events: 500, clubs: 850 }, streak: 3, lastGain: 110 },
  { id: 19, name: "Yash T", college: "Aditya Engineering College", points: 2300, monthPoints: 550, weekPoints: 130, catPoints: { hackathons: 300, internships: 400, events: 500, clubs: 800 }, streak: 2, lastGain: 100 },
  { id: 20, name: "Sakshi K", college: "Aditya Engineering College", points: 2200, monthPoints: 500, weekPoints: 120, catPoints: { hackathons: 250, internships: 350, events: 500, clubs: 800 }, streak: 1, lastGain: 90 },

  { id: 21, name: "Vineet J", college: "Aditya Engineering College", points: 2150, monthPoints: 480, weekPoints: 110, catPoints: { hackathons: 300, internships: 400, events: 450, clubs: 700 }, streak: 2, lastGain: 85 },
  { id: 22, name: "Anika S", college: "Aditya Engineering College", points: 2100, monthPoints: 460, weekPoints: 100, catPoints: { hackathons: 250, internships: 350, events: 450, clubs: 650 }, streak: 3, lastGain: 90 },
  { id: 23, name: "Ritika P", college: "Aditya Engineering College", points: 2050, monthPoints: 450, weekPoints: 95, catPoints: { hackathons: 250, internships: 300, events: 400, clubs: 600 }, streak: 1, lastGain: 70 },
  { id: 24, name: "Karan M", college: "Aditya Engineering College", points: 2000, monthPoints: 420, weekPoints: 90, catPoints: { hackathons: 200, internships: 300, events: 400, clubs: 600 }, streak: 2, lastGain: 60 },
  { id: 25, name: "Shruti G", college: "Aditya Engineering College", points: 1950, monthPoints: 400, weekPoints: 85, catPoints: { hackathons: 200, internships: 250, events: 350, clubs: 550 }, streak: 1, lastGain: 50 },

  // 26-50: Generating generic participants
  ...Array.from({length:25},(_,i)=>({
    id:26+i,
    name:'Participant ${26+i}',
    college:"Aditya Engineering College",
    points:Math.floor(1900 - i*20),
    monthPoints:Math.floor(400 - i*15),
    weekPoints:Math.floor(80 - i*3),
    catPoints: { hackathons:Math.floor(150 - i*5), internships:Math.floor(150 - i*4), events:Math.floor(200 - i*3), clubs:Math.floor(300 - i*2) },
    streak: Math.floor(Math.random()*10)+1,
    lastGain: Math.floor(Math.random()*50)+50
  })),

  // Your user
  { id: 60, name: "Harshitha M", college: "Aditya Engineering College", points: 1800, monthPoints: 450, weekPoints: 100, catPoints: { hackathons: 200, internships: 300, events: 400, clubs: 900 }, streak: 6, lastGain: 180 }
];


const listEl = document.getElementById('list');
const miniEl = document.getElementById('mini');
const youCardEl = document.getElementById('youCard');
const countEl = document.getElementById('count');

function getPoints(user){
  const filterTime = document.getElementById('timeFilter').value;
  const filterCat = document.getElementById('catFilter').value;
  let pts = filterTime==='month'?user.monthPoints:filterTime==='week'?user.weekPoints:user.points;
  if(filterCat!=='all') pts = user.catPoints[filterCat]||0;
  return pts;
}

function render(){
  const searchVal = document.getElementById('search').value.toLowerCase();
  let filtered = participants.map(u=>({...u, pts:getPoints(u)}));
  if(searchVal){
    filtered = filtered.filter(u=>u.name.toLowerCase().includes(searchVal) || u.college.toLowerCase().includes(searchVal));
  }
  const sorted = filtered.sort((a,b)=>b.pts-a.pts);
  countEl.textContent = '${sorted.length} participants';

  listEl.innerHTML='';
  sorted.forEach((u,i)=>{
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${i+1}</td>
      <td><div style="display:flex;align-items:center;gap:8px"><div class="avatar">${u.name[0]}</div>${u.name}<br><small style="color:${getComputedStyle(document.documentElement).getPropertyValue('--sub')};">${u.college}</small></div></td>
      <td>${u.pts}</td>
      <td class="badges">${i<3?'<span class="chip gold">🏅</span>':''}</td>
      <td><div class="progress"><i style="width:${Math.min(u.streak*10,100)}%"></i></div></td>
      <td class="kudos">+${u.lastGain}</td>
    `;
    listEl.appendChild(tr);
  });

  miniEl.innerHTML='';
  sorted.slice(0,10).forEach((u,i)=>{
    const div = document.createElement('div');
    div.style.display='flex'; div.style.justifyContent='space-between'; div.style.padding='6px 8px'; div.style.background='#dff8f0'; div.style.borderRadius='10px'; div.textContent='${i+1}.' '${u.name}' - '${u.pts}';
    miniEl.appendChild(div);
  });

  const meIndex = sorted.findIndex(u=>u.id===60);
  const me = sorted[meIndex] || {name:"Harshitha M", college:"Aditya Engineering College", pts:0, streak:0, lastGain:0};
  youCardEl.innerHTML = `<div style="display:flex;justify-content:space-between;padding:8px;background:#dff8f0;border-radius:12px;align-items:center;">
    <div>${meIndex>=0?meIndex+1:'-'}</div>
    <div>${me.name}<br><small style="color:${getComputedStyle(document.documentElement).getPropertyValue('--sub')};">${me.college}</small></div>
    <div>${me.pts}</div>
    <div style="flex:1;margin:0 8px;"><div class="progress"><i style="width:${Math.min(me.streak*10,100)}%"></i></div></div>
    <div class="kudos">+${me.lastGain}</div>
  </div>`;
}

document.getElementById('timeFilter').addEventListener('change',render);
document.getElementById('catFilter').addEventListener('change',render);
document.getElementById('search').addEventListener('input',render);

render();
</script>
</body>
</html>
