<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Youth Red Cross - Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&display=swap" rel="stylesheet">
<style>
  body {margin:0;font-family:'Montserrat',sans-serif;background:#E4FCEB;color:black;}
  .overlay{padding:40px 20px;position:relative;}
  h1,h2{text-align:center;margin:0;}
  h1{font-size:2.5em;margin-bottom:10px;}
  h2{font-size:1.3em;font-weight:normal;margin-bottom:40px;}
  .card-container{display:flex;flex-wrap:wrap;justify-content:center;gap:30px;max-width:1200px;margin:auto;}
  .card{background:white;border-radius:16px;padding:20px;width:280px;text-align:center;transition:0.3s;}
  .card:hover{transform:scale(1.05);box-shadow:0 1px 1px black;}
  .card img{height:100px;width:100px;margin-bottom:15px;}
  .card h4{font-size:1.5em;margin:10px 0;}
  .card p{font-size:0.8em;margin:10px 0 20px;}
  .horizontal-box{display:flex;justify-content:space-between;align-items:center;background:white;box-shadow:0 0px 15px rgba(0,0,0,0.2);padding:20px;margin:20px 80px;border-radius:10px;flex-wrap:wrap;position:relative;}
  .box-left{flex:1 1 60%;font-family:'Segoe UI',sans-serif;color:black;}
  .box-left h3{margin:0 0 8px 0;}
  .box-left p{margin:10px 0;font-size:1em;}
  .box-left strong{display:block;margin-top:8px;font-weight:bold;}
  .box-right{flex:1 1 35%;text-align:right;}
  .box-right button{margin-left:10px;padding:10px 16px;border:none;background-color:#12a838;color:white;border-radius:5px;font-weight:500;cursor:pointer;transition:0.3s;}
  .box-right button:hover{background-color:#09581d;}
  .delete-event{position:absolute;top:8px;right:8px;background:white;color:red;border:none;border-radius:50%;width:24px;height:24px;font-size:20px;cursor:pointer;}
  .quote{margin-top:50px;text-align:center;font-style:italic;font-size:1.2em;}
  .add-btn{position:absolute;top:20px;right:30px;padding:10px 16px;background-color:#12a838;color:white;border:none;border-radius:6px;font-weight:bold;cursor:pointer;}
  .form-popup-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:white;z-index:9;}
  .form-popup{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:white;padding:20px;border-radius:12px;box-shadow:0 6px 20px rgba(0,0,0,0.3);width:500px;z-index:10;color:black;}
  .form-popup input{width:100%;padding:8px;margin:8px 0;border:1px solid #ccc;border-radius:6px;}
  .form-popup button{width:100%;padding:10px;margin-top:10px;border:none;border-radius:6px;background:#12a838;color:white;cursor:pointer;}
  .close-btn{position:absolute;top:5px;right:10px;font-size:20px;cursor:pointer;color:red;}
  @media(max-width:768px){
    .horizontal-box{flex-direction:column;margin:20px;}
    .box-right{text-align:center;margin-top:10px;}
    .box-right button{margin:10px 5px;}
    .card{width:90%;}
  }
</style>
</head>
<body>
<div class="overlay">
  <button class="add-btn" onclick="openForm()">+ Add Event</button>
  <h1>Youth Red Cross - Admin</h1>
  <h2>Serving Humanity with Compassion and Care</h2>

  <div class="card-container">
    <div class="card">
      <img src="https://cdn-icons-png.flaticon.com/512/1780/1780870.png" alt="Health Awareness" />
      <h4>Health Awareness</h4>
      <p>Workshops on hygiene, nutrition, and mental health.</p>
    </div>
    <div class="card">
      <img src="https://cdn-icons-png.flaticon.com/512/4320/4320252.png" alt="Disaster Relief" />
      <h4>Disaster Preparedness</h4>
      <p>Training sessions for emergency response and safety.</p>
    </div>
  </div>

  <div id="dynamicEvents"></div>

  <div class="quote">“Serve One Another with a Smile” — Youth Red Cross Motto</div>
</div>

<div class="form-popup-overlay" id="formOverlay"></div>
<div class="form-popup" id="eventForm">
  <span class="close-btn" onclick="closeForm()">×</span>
  <h3>Add Event</h3>
  <input type="text" id="title" placeholder="Event Title" required>
  <input type="text" id="desc" placeholder="Description" required>
  <input type="text" id="lastDate" placeholder="Last Date" required>
  <input type="url" id="notice" placeholder="Notice Link" required>
  <input type="url" id="formLink" placeholder="Register Link" required>
  <button onclick="addEvent()">Save Event</button>
</div>

<script>
// *Initial static events*
const staticEvents = [
  {title:'First Aid Training', desc:'Learn essential life-saving techniques.', lastDate:'Aug 18', notice:'notice.pdf', form:'https://forms.office.com/r/vWejGk2zef'},
  {title:'Clean Campus Campaign', desc:'Join us in making our campus litter-free and green.', lastDate:'Aug 21', notice:'notice.pdf', form:'https://forms.office.com/r/vWejGk2zef'}
];

// Load events from localStorage, add static if not present
function initializeEvents(){
  let events = JSON.parse(localStorage.getItem('yrcEvents')) || [];
  if(events.length === 0){
    localStorage.setItem('yrcEvents', JSON.stringify(staticEvents));
    events = [...staticEvents];
  }
  loadEvents();
}

function loadEvents(){
  const container = document.getElementById('dynamicEvents');
  container.innerHTML = '';
  const events = JSON.parse(localStorage.getItem('yrcEvents')) || [];
  events.forEach((e,i)=>{
    const div = document.createElement('div');
    div.className = 'horizontal-box';
    div.innerHTML = `<button class="delete-event" onclick="deleteEvent(${i})">×</button>
      <div class="box-left"><h3>${e.title}</h3><p>${e.desc}</p><strong>Last Date: ${e.lastDate}</strong></div>
      <div class="box-right"><button onclick="window.open('${e.notice}')">Notice</button><button onclick="window.open('${e.form}')">Register</button></div>`;
    container.appendChild(div);
  });
}

function openForm(){document.getElementById('formOverlay').style.display='block'; document.getElementById('eventForm').style.display='block';}
function closeForm(){document.getElementById('formOverlay').style.display='none'; document.getElementById('eventForm').style.display='none';}

function addEvent(){
  const title=document.getElementById('title').value;
  const desc=document.getElementById('desc').value;
  const lastDate=document.getElementById('lastDate').value;
  const notice=document.getElementById('notice').value;
  const form=document.getElementById('formLink').value;
  if(!title||!desc||!lastDate||!notice||!form){alert("Fill all fields"); return;}
  const events=JSON.parse(localStorage.getItem('yrcEvents'))||[];
  events.push({title,desc,lastDate,notice,form});
  localStorage.setItem('yrcEvents',JSON.stringify(events));
  closeForm(); loadEvents();
}

function deleteEvent(i){
  const events=JSON.parse(localStorage.getItem('yrcEvents'))||[];
  events.splice(i,1);
  localStorage.setItem('yrcEvents',JSON.stringify(events));
  loadEvents();
}

window.onload = initializeEvents;
</script>
</body>
</html>
