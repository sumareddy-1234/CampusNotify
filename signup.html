<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CampusNotify | Sign Up</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: linear-gradient(120deg, #d4f9f2, #ffffff);
    }

    .container {
      width: 380px;
      background: #fff;
      padding: 35px;
      border-radius: 15px;
      box-shadow: 0px 8px 20px rgba(0,0,0,0.15);
      text-align: center;
    }

    h1 {
      color: #00b894;
      margin-bottom: 10px;
      font-size: 28px;
    }

    .subtitle {
      color: #555;
      font-size: 14px;
      margin-bottom: 25px;
    }

    .input-group {
      display: flex;
      align-items: center;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 15px;
      background: #f9f9f9;
    }

    .input-group i {
      color: #00b894;
      margin-right: 10px;
      font-size: 16px;
    }

    .input-group input {
      border: none;
      outline: none;
      background: transparent;
      flex: 1;
      font-size: 15px;
      color: #333;
    }

    ::placeholder {
      color: #aaa;
    }

    .signupbutton {
      width: 100%;
      padding: 12px;
      background: #00b894;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      color: white;
      cursor: pointer;
      transition: 0.3s;
      font-weight: 600;
    }

    .signupbutton:hover {
      background: #019874;
    }

    .signin-text {
      margin-top: 18px;
      font-size: 14px;
      color: #555;
    }

    .signin-text a {
      color: #00b894;
      font-weight: bold;
      text-decoration: none;
    }

    .signin-text a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>CampusNotify</h1>
    <p class="subtitle">Sign up to continue</p>

    <form id="signupForm" onsubmit="fun(event)">
      <div class="input-group">
        <i class="fa fa-user"></i>
        <input type="text" id="name" placeholder="College ID" required />
      </div>

      <div class="input-group">
        <i class="fa fa-envelope"></i>
        <input type="email" id="email" placeholder="Email" required />
      </div>

      <div class="input-group">
        <i class="fa fa-lock"></i>
        <input type="password" id="password" placeholder="Password" required />
      </div>

      <button type="submit" class="signupbutton">Create Account</button>

      <p class="signin-text">Already have an Account? <a href="login.html">Sign in</a></p>
    </form>
  </div>

  <script>
    function fun(event) {
      event.preventDefault();
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      let users = JSON.parse(localStorage.getItem('users')) || [];
      let existingUser = users.find(user => user.email === email);

      if (existingUser) {
        alert("User with this email already exists!");
        return;
      }

      const newUser = { name, email, password };
      users.push(newUser);
      localStorage.setItem('users', JSON.stringify(users));

      alert("Account created successfully!");
      document.getElementById('signupForm').reset();
    }
  </script>
</body>
</html>
